<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数字展销平台首页</title>
    <link rel="stylesheet" href="CSS/lab2-2504-155-index.css">
</head>
<body>
    <!-- 头部区域：Logo + 导航菜单（固定+浮动） -->
    <header class="header">
        <div class="logo">
            <img src="img/logo.jpg" alt="网站Logo">
        </div>
        <nav class="nav">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">图书分类</a></li>
                <li><a href="#">热门推荐</a></li>
                <li><a href="#">新书上市</a></li>
                <li><a href="#">联系我们</a></li>
                <li><a onclick="showBox()">登录/注册</a></li>
            </ul>
        </nav>
    </header>

    <!-- 点击空白处就能关闭） -->
    <div class="mask" id="mask" onclick="closeBox()">
        <!-- 登录注册盒子（父相子绝） -->
        <div class="login-box" id="loginBox" onclick="event.stopPropagation()">
            <!-- 右上角关闭按钮 -->
            <span class="close-btn" onclick="closeBox()">×</span>

            <!-- 登录表单 -->
            <div class="login-form" id="form1">
                <h3>登录</h3>
                <input type="text" id="user1" placeholder="用户名"><br>
                <input type="password" id="pwd1" placeholder="密码"><br>
                <button onclick="login()">登录</button>
                <p>没有账号？<span onclick="goReg()">去注册</span></p>
            </div>

            <!-- 注册表单 -->
            <div class="reg-form" id="form2">
                <h3>注册</h3>
                <input type="text" id="user2" placeholder="用户名"><br>
                <input type="password" id="pwd2" placeholder="密码"><br>
                <button onclick="reg()">注册</button>
                <p>已有账号？<span onclick="goLogin()">去登录</span></p>
            </div>
        </div>
    </div>

    <!-- 主体内容区：浮动三栏布局 -->
    <div class="container">
        <!-- 左侧栏：图书分类导航（相对定位） -->
        <aside class="left-sidebar">
            <h3>图书分类</h3>
            <ul>
                <li>文学小说</li>
                <li>科技计算机</li>
                <li>经济管理</li>
                <li>历史人文</li>
                <li>少儿读物</li>
            </ul>
        </aside>

        <!-- 中间栏：图书展示区 -->
        <main class="main-content">
            <!-- 图书展示区（父相子绝+鼠标悬停效果） -->
            <section class="book-show">
                <h3>图书展示区</h3>
                <div class="book-item">
                    <img src="img/book1.jpg" alt="图书封面">
                    <div class="book-info">这是一本热门图书，点击查看详情</div>
                </div>
            </section>

            <!-- 热门推荐（浮动排列） -->
            <section class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="hot-item">活着</div>
                <div class="hot-item">我与地坛</div>
                <div class="hot-item">明朝那些事儿</div>
                <div class="hot-item">世界喧嚣,我很好</div>
                <div class="hot-item">少有人走的路</div>
                <div class="hot-item">我从未如此眷恋人间</div>
                <!--清除浮动的空盒子 -->
                <div class="clearfix"></div>
            </section>



            <!-- 新书上市（Table布局） -->
            <section class="new-books">
                <h3>新书上市</h3>
                <table border="1" cellpadding="5" cellspacing="0">
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                    </tr>
                    <tr>
                        <td>《追风筝的人》</td>
                        <td>胡赛尼</td>
                        <td>139.9元</td>
                    </tr>
                    <tr>
                        <td>《月亮与六便士》</td>
                        <td>毛姆</td>
                        <td>145.0元</td>
                    </tr>
                </table>
            </section>
        </main>

        <!-- 右侧栏：促销信息（固定定位） -->
        <aside class="right-sidebar">
            <h3>促销活动</h3>
            <p>满100减20</p>
            <p>限时折扣8折</p>
        </aside>
    </div>

    <script>
    // 打开登录弹窗
    function showBox() {
        document.getElementById("mask").style.display = "block";
    }

    // 关闭登录弹窗（核心解决你退不出去的问题）
    function closeBox() {
        document.getElementById("mask").style.display = "none";
    }

    // 切换到注册页
    function goReg() {
        document.getElementById("form1").style.display = "none";
        document.getElementById("form2").style.display = "block";
    }

    // 切换到登录页
    function goLogin() {
        document.getElementById("form2").style.display = "none";
        document.getElementById("form1").style.display = "block";
    }

    // 注册功能：保存账号到本地存储
    function reg() {
        let user = document.getElementById("user2").value;
        let pwd = document.getElementById("pwd2").value;
        localStorage.setItem("user", user);
        localStorage.setItem("pwd", pwd);
        alert("注册成功！");
        goLogin();
    }

    // 登录功能：和本地存储的账号比对
    function login() {
        let user = document.getElementById("user1").value;
        let pwd = document.getElementById("pwd1").value;

        let localUser = localStorage.getItem("user");
        let localPwd = localStorage.getItem("pwd");

        if (user == localUser && pwd == localPwd) {
            alert("登录成功！");
            closeBox(); // 登录成功自动关闭弹窗
        } else {
            alert("账号或密码错误");
        }
    }
</script>
</body>
</html>
