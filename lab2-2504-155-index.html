<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数字展销平台首页</title>
    <link rel="stylesheet" href="CSS/lab2-2504-155-index.css">
</head>
<body>
    <!-- 头部区域：Logo + 导航菜单（固定+浮动） -->
    <header class="header">
        <div class="logo">
            <img src="img/logo.jpg" alt="网站Logo">
        </div>
        <nav class="nav">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">图书分类</a></li>
                <li><a href="#">热门推荐</a></li>
                <li><a href="#">新书上市</a></li>
                <li><a href="#">联系我们</a></li>
            </ul>
        </nav>
    </header>

    <!-- 主体内容区：浮动三栏布局 -->
    <div class="container">
        <!-- 左侧栏：图书分类导航（相对定位） -->
        <aside class="left-sidebar">
            <h3>图书分类</h3>
            <ul>
                <li>文学小说</li>
                <li>科技计算机</li>
                <li>经济管理</li>
                <li>历史人文</li>
                <li>少儿读物</li>
            </ul>
        </aside>

        <!-- 中间栏：图书展示区 -->
        <main class="main-content">
            <!-- 图书展示区（父相子绝+鼠标悬停效果） -->
            <section class="book-show">
                <h3>图书展示区</h3>
                <div class="book-item">
                    <img src="img/book1.jpg" alt="图书封面">
                    <div class="book-info">这是一本热门图书，点击查看详情</div>
                </div>
            </section>

            <!-- 热门推荐（浮动排列） -->
            <section class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="hot-item">活着</div>
                <div class="hot-item">我与地坛</div>
                <div class="hot-item">明朝那些事儿</div>
                <div class="hot-item">世界喧嚣,我很好</div>
                <div class="hot-item">少有人走的路</div>
                <div class="hot-item">我从未如此眷恋人间</div>
                <!--清除浮动的空盒子 -->
                <div class="clearfix"></div>
            </section>



            <!-- 新书上市（Table布局） -->
            <section class="new-books">
                <h3>新书上市</h3>
                <table border="1" cellpadding="5" cellspacing="0">
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                    </tr>
                    <tr>
                        <td>《追风筝的人》</td>
                        <td>胡赛尼</td>
                        <td>139.9元</td>
                    </tr>
                    <tr>
                        <td>《月亮与六便士》</td>
                        <td>毛姆</td>
                        <td>145.0元</td>
                    </tr>
                </table>
            </section>
        </main>

        <!-- 右侧栏：促销信息（固定定位） -->
        <aside class="right-sidebar">
            <h3>促销活动</h3>
            <p>满100减20</p>
            <p>限时折扣8折</p>
        </aside>
    </div>
</body>
</html>
